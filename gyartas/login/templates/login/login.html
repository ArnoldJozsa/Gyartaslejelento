<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1E3A8A;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-box h1 {
            margin-bottom: 20px;
            color: #1E3A8A;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            font-weight: bold;
        }

        button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #3B82F6, #1E40AF);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

button:hover {
    background: linear-gradient(135deg, #2563EB, #1E3A8A);
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

    </style>
</head>

<body>

    <div class="login-box">
        <h1>Bejelentkezés</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" id="loginForm">
            {% csrf_token %}

            <h3>Olvassa be vonalkódját vagy adja meg adatait!</h3>

            <input type="text" class="form-control" name="felhasznalonev" id="felhasznalonev" placeholder="Felhasználónév vagy vonalkód" autofocus>
            <input type="password" class="form-control" name="jelszo" id="jelszo" placeholder="Jelszó">
            <button type="submit">Belépés</button>
        </form>
    </div>

    <script>
        
        document.getElementById("felhasznalonev").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                document.getElementById("loginForm").submit();
            }
        });
    </script>

</body>
</html>
